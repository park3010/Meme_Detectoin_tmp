schema_version: meme_detection_config_v1

paths:
  dataset_root: dataset/source
  annotation_root: dataset/annotation
  normalized_root: dataset/annotation_normalized
  result_root: result
  retrieval_corpus_paths:
    - dataset/source/wiki_common/cache/corpus_texts.jsonl

runtime:
  device: cuda
  seed: 13
  num_workers: 4
  max_samples: null
  save_per_sample: false
  log_level: INFO

data:
  keep_missing_images: true
  default_datasets:
    - harm_c
    - harm_p
    - facebook
    - memotion
  split_ratios:
    train: 0.7
    valid: 0.1
    test: 0.2

model:
  hidden_dim: 256
  internal_top_k: 6
  knowledge_top_k: 8

backbone:
  clip:
    prefer_pretrained: true
    model_name: ViT-B-32
    asset_mode: local_checkpoint
    pretrained_tag: null
    checkpoint_path: assets/pretrained/vision/open_clip_vit_b_32/checkpoint.pt
    cache_dir: assets/pretrained/vision/open_clip_vit_b_32/cache
    local_files_only: true
    allow_download: false
    require_pretrained_for_main: true
  text:
    prefer_transformers: true
    model_name: microsoft/deberta-v3-base
    asset_mode: local_directory
    checkpoint_path: assets/pretrained/text/deberta_v3_base
    cache_dir: assets/pretrained/text/deberta_v3_base/cache
    local_files_only: true
    allow_download: false
    require_pretrained_for_main: true
  detector:
    mode: heuristic
  retriever:
    backend: local
    fallback_candidates: true
    max_documents: 5000
    use_cross_encoder_rerank: true
  generator:
    backend: template

pipeline:
  enabled_stages:
    - stage_a
    - stage_b
    - stage_c
    - stage_d
    - stage_e

stages:
  stage_a:
    hidden_dim: 256
    max_text_tokens: 64
    max_rois: 3
    output_path: result/stage_a/internal_evidence.jsonl
  stage_b:
    max_queries: 6
    top_k: 8
    max_documents: 5000
    use_cross_encoder_rerank: true
    output_path: result/stage_b/knowledge_candidates.jsonl
  stage_c:
    top_k: 8
    min_relevance: 0.05
    allow_low_relevance_fallback: true
    output_path: result/stage_c/verified_knowledge.jsonl
  stage_d:
    hidden_dim: 256
    num_heads: 4
    num_layers: 2
    output_path: result/stage_d/fusion_states.pt
  stage_e:
    output_path: result/stage_e/final_predictions.jsonl

experiments:
  ours_full:
    name: ours_full
    seeds: [42, 52, 123, 777, 2026]
    epochs: 5
    lr: 0.0001
    patience: 2
    freeze_backbones: true
    train_relevance_mlp: true
    structured_auxiliary: true
  ablations:
    name: stage_wise_ablation
    seeds: [42, 52, 123, 777, 2026]
    ablations:
      - full
      - w_o_roi
      - w_o_incongruity
      - w_o_retrieval
      - w_o_context_generation
      - w_o_relevance_scorer
      - w_o_support_verifier
      - w_o_temporal_cultural_validator
      - w_o_task_aware_gate
      - w_o_structured_auxiliary
      - label_only_no_evidence
    fusion_modes:
      - concat_mlp
      - mean_pooling
      - cross_attention
      - shared_gate
      - task_aware_gate
      - task_aware_gate_verified
  knowledge_comparison:
    name: knowledge_comparison
    seeds: [42, 52, 123, 777, 2026]
    modes:
      - no_knowledge
      - generated_only
      - retrieved_only
      - generated_retrieved
      - verified
  suites:
    core_smoke:
      description: "Small end-to-end contract validation suite."
      datasets: [harm_c]
      seeds: [42]
      epochs: 1
      limit: 100
      include:
        full_model: true
        baselines:
          - text_only_encoder
        ablations:
          - w_o_retrieval
          - w_o_task_aware_gate
          - w_o_structured_auxiliary
      audit_after_run: true
      require_nonempty_metrics: true
    core_1seed:
      description: "Primary one-seed comparison across datasets."
      datasets:
        - harm_c
        - harm_p
        - facebook
        - memotion
      seeds: [42]
      epochs: null
      limit: null
      include:
        full_model: true
        baselines:
          - text_only_encoder
          - image_only_clip
          - clip_text_concat
        ablations:
          - w_o_retrieval
          - w_o_support_verifier
          - w_o_task_aware_gate
          - w_o_structured_auxiliary
      audit_after_run: true
      require_nonempty_metrics: true
    core_5seed:
      description: "Primary multi-seed result suite."
      datasets:
        - harm_c
        - harm_p
        - facebook
        - memotion
      seeds: [42, 52, 123, 777, 2026]
      epochs: null
      limit: null
      include:
        full_model: true
        baselines:
          - text_only_encoder
          - image_only_clip
          - clip_text_concat
        ablations:
          - w_o_retrieval
          - w_o_support_verifier
          - w_o_task_aware_gate
          - w_o_structured_auxiliary
      audit_after_run: true
      require_nonempty_metrics: true
    knowledge_1seed:
      description: "Knowledge source comparison."
      datasets:
        - harm_c
        - harm_p
      seeds: [42]
      epochs: null
      limit: null
      include:
        knowledge_modes:
          - no_knowledge
          - retrieved_only
          - generated_retrieved
          - verified
      audit_after_run: true

debug:
  verbose_outputs: false

preflight:
  schema_version: experiment_preflight_v1
  profiles:
    smoke:
      description: "Offline structural validation. Fallback encoders are allowed."
      require_pretrained_vision: false
      require_pretrained_text: false
      forbid_fallback_backbones: false
      require_local_assets: false
      require_retrieval_corpus: false
      require_metric_eligibility: false
      create_missing_splits: true
      probe_pipeline: false
    main_experiment:
      description: "Paper-quality experimental readiness."
      require_pretrained_vision: true
      require_pretrained_text: true
      forbid_fallback_backbones: true
      require_local_assets: true
      require_retrieval_corpus: true
      require_metric_eligibility: true
      create_missing_splits: true
      probe_pipeline: false
  eligibility:
    fields:
      - harmfulness
      - target_presence
      - target_granularity
      - intent_primary
      - tactic_rhetorical
      - tactic_multimodal_relation
    hard_min_train_labeled_samples: 1
    hard_min_valid_labeled_samples: 1
    hard_min_test_labeled_samples: 1
    hard_min_eval_classes: 2
    advisory_min_train_labeled_samples: 20
    advisory_min_valid_labeled_samples: 10
    advisory_min_test_labeled_samples: 10
    advisory_min_samples_per_present_class: 2
  metric_contract:
    schema_version: structured_metric_contract_v1
    harmfulness:
      task_type: single_label
      primary_metric: macro_f1
      secondary_metrics: [accuracy, auroc, precision, recall]
    target_presence:
      task_type: single_label
      primary_metric: macro_f1
    target_granularity:
      task_type: single_label
      primary_metric: macro_f1
    intent_primary:
      task_type: single_label
      primary_metric: macro_f1
    tactic_multimodal_relation:
      task_type: single_label
      primary_metric: macro_f1
    tactic_rhetorical:
      task_type: multilabel
      primary_metric: macro_f1
      prediction_source: logits_only
      rendered_label_field_forbidden_for_metric: true
      threshold_policy: validation_grid_search
      threshold_candidates:
        - 0.05
        - 0.10
        - 0.15
        - 0.20
        - 0.25
        - 0.30
        - 0.35
        - 0.40
        - 0.45
        - 0.50
        - 0.55
        - 0.60
        - 0.65
        - 0.70
        - 0.75
        - 0.80
        - 0.85
        - 0.90
        - 0.95
