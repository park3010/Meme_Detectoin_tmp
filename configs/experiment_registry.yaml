suites:
  harmeme_to_fhm_smoke:
    description: Small protocol-valid built-in dry-run/smoke suite.
    experiments: [text_only_deberta, ours_full]
    seeds: [42]
    datasets: [harm_c, harm_p, facebook]
    limit: 100
    enabled: true
  harmeme_to_fhm_1seed:
    description: One-seed built-in baseline, Ours Full, and core-ablation suite.
    experiments: [text_only_deberta, image_only_openclip, image_text_concat, openclip_classifier, ours_full, ablation_w_o_retrieval, ablation_w_o_support_verifier, ablation_w_o_task_aware_gate, ablation_w_o_structured_auxiliary]
    seeds: [42]
    datasets: [harm_c, harm_p, facebook]
    enabled: true
  harmeme_to_fhm_5seed:
    description: Five-seed paper suite for built-in models and core ablations.
    experiments: [text_only_deberta, image_only_openclip, image_text_concat, openclip_classifier, ours_full, ablation_w_o_retrieval, ablation_w_o_support_verifier, ablation_w_o_task_aware_gate, ablation_w_o_structured_auxiliary]
    seeds: [42, 52, 123, 777, 2026]
    datasets: [harm_c, harm_p, facebook]
    enabled: true
  harmeme_to_fhm_knowledge_1seed:
    description: Registered knowledge comparison; blocked until train-time modes exist.
    experiments: [knowledge_no_knowledge, knowledge_retrieved_only, knowledge_generated_retrieved, knowledge_verified]
    seeds: [42]
    datasets: [harm_c, harm_p, facebook]
    enabled: true
  harmeme_to_fhm_structured_1seed:
    description: FHM silver structured evaluation for applicable trained models.
    experiments: [ours_full, ablation_w_o_retrieval, ablation_w_o_support_verifier, ablation_w_o_task_aware_gate, ablation_w_o_structured_auxiliary]
    seeds: [42]
    datasets: [facebook]
    enabled: true
  harmeme_to_fhm_error_export:
    description: Error and human-review package export from completed FHM runs.
    experiments: [ours_full]
    seeds: [42]
    datasets: [facebook]
    enabled: true

legacy_suites:
  core_smoke: {enabled: false, role: legacy_in_domain_diagnostic}
  core_1seed: {enabled: false, role: legacy_in_domain_diagnostic}
  core_5seed: {enabled: false, role: legacy_in_domain_diagnostic}
  knowledge_1seed: {enabled: false, role: legacy_in_domain_diagnostic}
