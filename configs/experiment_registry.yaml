schema_version: research_experiment_registry_v1
registry_version: wsmd2027_harmeme_fhm_20260714_v1

protocol:
  name: harmeme_to_fhm_v1
  split_seed: 42
  source_train_datasets: [harm_c, harm_p]
  source_validation_datasets: [harm_c, harm_p]
  heldout_test_datasets: [facebook]
  disabled_datasets: [memotion]
  label_set: clean
  source_split_manifest: result/splits/harmeme/source_split_seed_42.json
  heldout_test_manifest: result/splits/fhm/heldout_test_manifest.json
  fhm_structured_annotation_provenance: agent_silver_structured_evaluation
  model_seeds:
    smoke: [42]
    one_seed: [42]
    five_seed: [42, 52, 123, 777, 2026]

knowledge_sources:
  wikipedia_wikidata: {enabled: true, status: blocked_dependency, reason: current corpus provenance includes FHM}
  conceptnet: {enabled: false, status: blocked_dependency, reason: source unavailable locally}
  know_your_meme: {enabled: false, status: blocked_dependency, reason: source unavailable locally}
  news_event: {enabled: false, status: blocked_dependency, reason: source unavailable locally}
  web_snippets: {enabled: false, status: blocked_dependency, reason: live web retrieval disabled}
  mixed: {enabled: false, status: blocked_dependency, reason: component sources unavailable}

