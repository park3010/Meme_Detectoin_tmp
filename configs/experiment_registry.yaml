    seeds: [42]
    split_manifest: result/splits/harmeme/source_split_seed_42.json
    dependencies: [completed_applicable_model_predictions]
    execution_type: posthoc_silver_evaluation
    environment_name: meme_cikm
    estimated_cost: low
    estimated_gpu_memory: 0
    official_paper_url: null
    official_code_url: null
    official_code_status: in_repository
    implementation_policy: canonical_posthoc_evaluation
    paper_targets: [structured]
    notes: [Silver structured evaluation; never describe as human-adjudicated gold.]
  automatic_evidence_rationale_verifier:
