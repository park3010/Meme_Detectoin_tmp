    display_name: Retrieved Only
    knowledge_mode: retrieved_only
  knowledge_generated_retrieved:
    <<: *knowledge_base
    display_name: Generated + Retrieved
    knowledge_mode: generated_retrieved
  knowledge_verified:
    <<: *knowledge_base
    display_name: Verified Knowledge
    knowledge_mode: verified_knowledge
