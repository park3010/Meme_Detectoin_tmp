    seeds: [42, 52, 123, 777, 2026]
    split_manifest: result/splits/harmeme/source_split_seed_42.json
    dependencies: [local_deberta_v3_base]
    execution_type: supervised_train
    environment_name: meme_cikm
    estimated_cost: medium
    estimated_gpu_memory: unknown
    official_paper_url: null
    official_code_url: null
    official_code_status: in_repository
    implementation_policy: canonical_builtin
    paper_targets: [main_baseline]
    notes: [Uses original harmfulness labels and the fixed HarMeme split.]
